<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruletita</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; font-family: Arial, sans-serif; }
    #resultado {
      font-size: 1.4rem;
      font-weight: bold;
      padding: 24px;
      border: 1px solid #dee2e6;
      border-radius: 12px;
      background: white;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ya-salio { text-decoration: line-through; color: #bbb; }
  </style>
</head>
<body>

  <div class="container py-5 text-center" style="max-width: 600px;">

    <h1 class="fw-bold text-primary mb-2">🎯 Ruleta de Participantes</h1>
    <p class="text-muted mb-4">Haz clic en el botón para seleccionar a un participante al azar de la lista.</p>

    <div id="resultado" class="mb-4">¡Presiona el botón para comenzar!</div>

    <button id="getRandom" class="btn btn-primary btn-lg px-5 mb-4">🎲 Lanzar Ruleta</button>

    <p id="contador" class="text-muted small mb-3"></p>

    <ul id="lista-pendientes" class="list-unstyled text-start" style="columns: 2;"></ul>

  </div>

<script src="assets/js/ruleta.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
